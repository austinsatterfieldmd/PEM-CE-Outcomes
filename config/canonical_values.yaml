# =============================================================================
# NORMALIZATION RULES (Applied during import/post-processing)
# Based on Phase 4 Accuracy Analysis: 168 reviewed questions, 556 field edits
# =============================================================================
normalization_rules:
  # Treatment names: lowercase → Title Case
  treatment:
    daratumumab: Daratumumab
    bortezomib: Bortezomib
    lenalidomide: Lenalidomide
    carfilzomib: Carfilzomib
    isatuximab: Isatuximab
    teclistamab: Teclistamab
    talquetamab: Talquetamab
    idecabtagene vicleucel: Idecabtagene vicleucel
    ciltacabtagene autoleucel: Ciltacabtagene autoleucel
    elranatamab: Elranatamab
    pomalidomide: Pomalidomide
    selinexor: Selinexor

  # Age groups: verbose → simplified
  age_group:
    "Younger (<65)": Young
    "Elderly (65-74)": Transitional
    "Very elderly (>=75)": Elderly

  # Disease types: standardize MM subtypes
  disease_type:
    Smoldering: Smoldering MM

  # Answer patterns: default to Uniform (32 corrections Variable→Uniform)
  answer_length_pattern:
    Variable: Uniform
    "Correct longest": Uniform  # Major test-wiseness flaw
    "Correct shortest": Uniform  # Major test-wiseness flaw

  # Topic: distinguish safety concepts (3 corrections)
  topic:
    "AE management": Safety profile  # When discussing general safety, not managing specific AE

# =============================================================================
# LEARNINGS FROM HUMAN REVIEW (Phase 4 Analysis)
# =============================================================================
# Top error patterns (count ≥ 10):
# 1. answer_length_pattern: Variable→Uniform (32x) - Default to Uniform
# 2. distractor_homogeneity: Homogeneous↔Heterogeneous (27x) - Requires judgment
# 3. age_group: terminology normalization (24x) - Apply mapping above
# 4. treatment capitalization (40+ corrections) - Title Case all drug names
# 5. BCMA biomarker incorrectly tagged (8x) - Don't tag BCMA when it's drug target
#
# Key principles:
# - BCMA: Tag as drug_target (Anti-BCMA CAR-T), NOT as biomarker
# - Risk stratification: Tag in disease_type_2 (High-risk, Standard-risk)
# - Lytic lesions: Tag in symptom fields, not metastatic_site
# - CAR-T eligibility: Distinct from transplant eligibility
