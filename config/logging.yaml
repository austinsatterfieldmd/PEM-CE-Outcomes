# Logging Configuration

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  json:
    class: structlog.stdlib.ProcessorFormatter
    processor: structlog.processors.JSONRenderer()

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

  tagging_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/tagging.log
    maxBytes: 52428800  # 50MB
    backupCount: 10

loggers:
  src.core.taggers:
    level: DEBUG
    handlers: [console, tagging_file]
    propagate: false

  src.api:
    level: INFO
    handlers: [console, file]
    propagate: false

  src.workflows:
    level: INFO
    handlers: [console, tagging_file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]
