# OpenRouter Model Configuration

# API settings
openrouter:
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  site_url: "https://cme-outcomes-dashboard.local"
  site_name: "CME Outcomes Tagger V3"

# Model configurations for 3-model voting
models:
  gpt:
    id: "openai/gpt-5.2"
    display_name: "GPT-5.2"
    context_window: 400000
    cost_per_m_input: 1.75
    cost_per_m_output: 14.00
    temperature: 0.1
    max_tokens: 1000

  claude:
    id: "anthropic/claude-opus-4.5"
    display_name: "Claude Opus 4.5"
    context_window: 200000
    cost_per_m_input: 5.00
    cost_per_m_output: 25.00
    temperature: 0.1
    max_tokens: 1000

  gemini:
    id: "google/gemini-2.5-pro"
    display_name: "Gemini 2.5 Pro"
    context_window: 1048576
    cost_per_m_input: 1.25
    cost_per_m_output: 10.00
    temperature: 0.1
    max_tokens: 1000

  search:
    id: "perplexity/sonar"
    display_name: "Perplexity Sonar"
    context_window: 127072
    cost_per_m_input: 1.00
    cost_per_m_output: 1.00
    cost_per_k_requests: 5.00
    temperature: 0.2
    max_tokens: 2000
    web_search_options:
      search_context_size: "high"

# Model roles
voting_models:
  - gpt
  - claude
  - gemini

search_model: search
